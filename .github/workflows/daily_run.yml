name: Daily MEO Run

on:
  schedule:
    # 0 UTC = 9 AM JST every day
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no API writes)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      skip_posts:
        description: "Skip local post creation"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      skip_reviews:
        description: "Skip review reply posting"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      store:
        description: "Run only for this store key (leave blank for all). Keys: the_body_osaka_shinsaibashi | the_body_kyoto | mybear_studio_kyoto"
        required: false
        default: ""
      force:
        description: "Bypass the daily cadence guard and re-post even if a post was already made today"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Restore the duplicate-post guard state from the previous run.
      # Cache key: unique per run so we always save a fresh snapshot;
      # restore-keys: picks up the most recent saved state automatically.
      - name: Restore post state
        uses: actions/cache/restore@v4
        with:
          path: logs/state.json
          key: meo-state-${{ github.run_id }}
          restore-keys: |
            meo-state-

      - name: Install dependencies
        # Install cffi first so the Rust cryptography extension (via google-auth)
        # initialises correctly on ubuntu-latest.  cffi is now a declared dep in
        # pyproject.toml but pip resolves it last by default, so we pin it first.
        run: pip install cffi && pip install -e .

      - name: Validate config structure
        run: python -m meo.tools.validate --no-env

      - name: Run MEO automation
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Pass free-text input through env to prevent template-injection into
          # the shell script (GitHub's recommended hardening for user-controlled
          # inputs — see: docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections)
          MEO_STORE_INPUT: ${{ inputs.store }}
        run: |
          # If ALL required credentials are still empty the tool has never been
          # configured.  Exit 0 with a notice instead of failing every day while
          # the owner works through the setup steps.  Once even one credential is
          # added this check falls through and the tool runs (and gives a clear
          # error for any still-missing ones).
          if [ -z "$GOOGLE_CLIENT_ID" ] && \
             [ -z "$GOOGLE_CLIENT_SECRET" ] && \
             [ -z "$GOOGLE_REFRESH_TOKEN" ] && \
             [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::Credentials not yet configured. Add GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN, and ANTHROPIC_API_KEY to repository secrets to activate the daily run. See README.md for setup instructions."
            exit 0
          fi
          ARGS=""
          # scheduled runs are always live; workflow_dispatch respects inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.dry_run }}" = "true" ]     && ARGS="$ARGS --dry-run"
            [ "${{ inputs.skip_posts }}" = "true" ]  && ARGS="$ARGS --skip-posts"
            [ "${{ inputs.skip_reviews }}" = "true" ] && ARGS="$ARGS --skip-reviews"
            [ "${{ inputs.force }}" = "true" ]        && ARGS="$ARGS --force"
            # $MEO_STORE_INPUT is safe: passed via env, not interpolated into script
            [ -n "$MEO_STORE_INPUT" ]                 && ARGS="$ARGS --store $MEO_STORE_INPUT"
          fi
          python -m meo.main $ARGS

      # Save state after the run so the next run's duplicate guard has context.
      # continue-on-error: true guards against the first-ever run where state.json
      # may not exist (e.g., dry-run with no stores configured).
      - name: Save post state
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: logs/state.json
          key: meo-state-${{ github.run_id }}

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meo-log-${{ github.run_id }}
          path: logs/meo.log
          retention-days: 30
          if-no-files-found: ignore
