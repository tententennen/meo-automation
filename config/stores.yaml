# Store configuration for MEO automation
# Fill in location_id and drive_folder_id before running.
#
# location_id: Google Business Profile location ID.
#   Format: "accounts/{account_id}/locations/{location_id}"
#   Find it via: python -m meo.tools.discover_locations
#
# drive_folder_id: Google Drive folder ID that contains photos for this store.
#   Find it in the folder's URL: https://drive.google.com/drive/folders/{FOLDER_ID}
#
# call_to_action (optional): attaches a button to each local post.
#   action_type: BOOK | ORDER | SHOP | LEARN_MORE | SIGN_UP | CALL | GET_OFFER
#   url: the destination URL for the button (e.g. your online booking page)
#   Leave this section commented out to post without a call-to-action button.

