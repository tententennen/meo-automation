    # overrides:                          # optional: shadow content.yaml defaults for this store only
    #   post_cadence_days: 1              # days between 最新情報 posts (global default: 1)
    #   min_star_autoreply: 1             # hold reviews below this rating (1 = reply to all; 3 = hold 1-2★)
    #   max_replies_per_run: 10           # cap on LLM reply calls per run (global default: 10)
    #   max_post_chars: 1500              # max chars for generated post body (global default: 1500)
    #   max_reply_chars: 4096             # max chars for generated reply (global default: 4096)
    #   max_review_age_days: 90           # skip reviews older than N days (0 = no limit; global default: 90)

